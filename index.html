<!DOCTYPE html>
<html>
<head>
<title>OTC Sales Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container-fluid p-3 bg-dark text-light">
<h2>OTC Sales Dashboard</h2>

<div class="row my-3">
<div class="col"><div class="card p-3"><h5>Target (Cr)</h5><h2 id="target"></h2></div></div>
<div class="col"><div class="card p-3"><h5>Actual (Cr)</h5><h2 id="actual"></h2></div></div>
<div class="col"><div class="card p-3"><h5>Achievement</h5><h2 id="achievement"></h2></div></div>
</div>

<div class="row mb-3">
<div class="col"><select id="stateFilter" class="form-select"><option>All States</option></select></div>
</div>

<table class="table table-striped bg-white">
<thead><tr><th>Region</th><th>Sales</th></tr></thead>
<tbody id="tableBody"></tbody>
</table>
</div>
<script src="app.js"></script>
</body>
</html>
